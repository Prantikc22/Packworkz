    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Packworkz",
      "url": "https://packworkz.com",
      "logo": "https://packworkz.com/favicon.png",
      "description": "India's first managed packaging platform for D2C, FMCG and pharma brands",
      "foundingLocation": "India",
      "areaServed": ["IN", "US", "GB", "AE"],
      "serviceType": "Packaging Procurement Platform",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-82089-90366",
        "contactType": "sales",
        "availableLanguage": ["English", "Hindi"]
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "220"
      },
      "sameAs": [
        "https://www.linkedin.com/company/packworkz",
        "https://twitter.com/packworkz"
      ]
    }
    </script>

    <!-- Structured Data — WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Packworkz",
      "url": "https://packworkz.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://packworkz.com/products?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the minimum order quantity (MOQ) for packaging on Packworkz?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Packworkz has some of India's lowest MOQs — starting from 200 units for glass jars and 500 units for flexible pouches and mailers. MOQ varies by SKU and material."
          }
        },
        {
          "@type": "Question",
          "name": "How long does packaging delivery take in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Standard packaging delivery within India takes 10–15 business days. With SmartStock™ buffer inventory, Packworkz can deliver in as little as 5 days for pre-stocked SKUs."
          }
        },
        {
          "@type": "Question",
          "name": "Does Packworkz offer EPR-compliant packaging?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Packworkz offers EPR-compliant packaging options including recycled PE, compostable mailers, and kraft paper packaging — all with full documentation for CPCB compliance."
          }
        },
        {
          "@type": "Question",
          "name": "Can Packworkz handle custom printed packaging for D2C brands?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Packworkz offers full custom printing, design services (from ₹1,999), and branding across all 110+ SKUs — from flexible pouches to rigid boxes and labels."
          }
        },
        {
          "@type": "Question",
          "name": "What industries does Packworkz serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Packworkz serves D2C brands, FMCG manufacturers, pharma and healthcare companies, cosmetics brands, food and beverage companies, electronics, jewellery and luxury, and exporters targeting US, UK, and UAE markets."
          }
        }
      ]
    }
    </script>

    <!-- Structured Data — Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "Managed Packaging Platform",
      "provider": {
        "@type": "Organization",
        "name": "Packworkz"
      },
      "description": "End-to-end packaging procurement — design, sourcing, QC, and delivery — for D2C, FMCG and pharma brands across India and globally.",
      "areaServed": "IN",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Packaging SKU Catalog",
        "numberOfItems": "110"
      }
    }
    </script>
