openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Packwerk B2B Packaging Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: quotes
    description: Quote request operations
  - name: orders
    description: Order operations
  - name: users
    description: User profile operations
  - name: design
    description: Design request operations
  - name: samples
    description: Sample request operations
  - name: invoices
    description: Invoice operations
  - name: admin
    description: Admin operations
  - name: testimonials
    description: Testimonial operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [flexible, rigid, boxes, ecommerce, rolls, accessories, sustainable, premium]
        - name: is_eco
          in: query
          schema:
            type: boolean
        - name: is_smartstock
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  total:
                    type: integer
                required: [data, total]

  /products/{slug}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found

  /products/categories/summary:
    get:
      operationId: getCategorySummary
      tags: [products]
      summary: Get count per category
      responses:
        "200":
          description: Category summary
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    category:
                      type: string
                    count:
                      type: integer
                  required: [category, count]

  /quotes:
    post:
      operationId: submitQuote
      tags: [quotes]
      summary: Submit a new quote request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Quote submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  quote_id:
                    type: string
                  id:
                    type: string
                required: [quote_id, id]
        "400":
          description: Invalid request

  /quotes/{quoteId}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: Get quote by quote_id
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteRequest"

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [users]
      summary: Get dashboard overview stats for current user
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/orders:
    get:
      operationId: getDashboardOrders
      tags: [orders]
      summary: Get all orders for current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/designs:
    get:
      operationId: getDashboardDesigns
      tags: [design]
      summary: Get design requests for current user
      responses:
        "200":
          description: Design requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DesignRequest"

  /dashboard/invoices:
    get:
      operationId: getDashboardInvoices
      tags: [invoices]
      summary: Get invoices for current user
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /dashboard/profile:
    get:
      operationId: getDashboardProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateDashboardProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /design-requests:
    post:
      operationId: createDesignRequest
      tags: [design]
      summary: Create a design request after payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDesignRequest"
      responses:
        "201":
          description: Design request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  design_id:
                    type: string
                  id:
                    type: string
                required: [design_id, id]

  /sample-requests:
    post:
      operationId: createSampleRequest
      tags: [samples]
      summary: Create a sample request after payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSampleRequest"
      responses:
        "201":
          description: Sample request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sample_id:
                    type: string
                  id:
                    type: string
                required: [sample_id, id]

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List active testimonials
      responses:
        "200":
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

  /admin/quotes:
    get:
      operationId: adminListQuotes
      tags: [admin]
      summary: List all quotes (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quotes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteRequest"

  /admin/quotes/{id}/status:
    put:
      operationId: adminUpdateQuoteStatus
      tags: [admin]
      summary: Update quote status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [submitted, reviewing, quoted, accepted, rejected]
                rejection_reason:
                  type: string
              required: [status]
      responses:
        "200":
          description: Updated

  /admin/quotes/{id}/accept:
    post:
      operationId: adminAcceptQuote
      tags: [admin]
      summary: Accept quote, create order and user account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                total_price:
                  type: number
                payment_type:
                  type: string
                  enum: [upfront, standard, credit]
                line_items:
                  type: array
                  items:
                    type: object
              required: [total_price, payment_type, line_items]
      responses:
        "200":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                  user_created:
                    type: boolean
                required: [order_id, user_created]

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}/status:
    put:
      operationId: adminUpdateOrderStatus
      tags: [admin]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [confirmed, in_production, qc, dispatched, delivered]
                tracking_number:
                  type: string
                tracking_url:
                  type: string
              required: [status]
      responses:
        "200":
          description: Updated

  /admin/designs:
    get:
      operationId: adminListDesigns
      tags: [admin]
      summary: List all design requests (admin)
      parameters:
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Design requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DesignRequest"

  /admin/designs/{id}/status:
    put:
      operationId: adminUpdateDesignStatus
      tags: [admin]
      summary: Update design request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [paid, in_design, revision, approved]
                designer_notes:
                  type: string
              required: [status]
      responses:
        "200":
          description: Updated

  /admin/samples:
    get:
      operationId: adminListSamples
      tags: [admin]
      summary: List all sample requests (admin)
      parameters:
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sample requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SampleRequest"

  /admin/samples/{id}/dispatch:
    post:
      operationId: adminDispatchSample
      tags: [admin]
      summary: Mark sample as dispatched
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated

  /auth/login:
    post:
      operationId: login
      tags: [users]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required: [email, password]
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  user:
                    $ref: "#/components/schemas/UserProfile"
                required: [access_token, user]
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [users]
      summary: Logout current user
      responses:
        "200":
          description: Logged out

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
          enum: [flexible, rigid, boxes, ecommerce, rolls, accessories, sustainable, premium]
        description:
          type: string
        use_case:
          type: string
        price_min:
          type: number
        price_max:
          type: number
        moq:
          type: integer
        moq_unit:
          type: string
        is_smartstock:
          type: boolean
        is_eco:
          type: boolean
        sample_tier:
          type: string
          enum: [standard, premium, complex, not_required]
        sample_price:
          type: integer
        image_url:
          type: string
          nullable: true
        specs:
          type: object
        compliance_certs:
          type: array
          items:
            type: string
        delivery_days_india:
          type: integer
        delivery_days_global:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
      required: [id, name, slug, category, description, use_case, price_min, price_max, moq, moq_unit, is_smartstock, is_eco, sample_tier, sample_price, delivery_days_india, delivery_days_global, is_active]

    CreateQuoteRequest:
      type: object
      properties:
        contact_name:
          type: string
        company_name:
          type: string
        email:
          type: string
        phone:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              product_name:
                type: string
              quantity:
                type: integer
              variants:
                type: string
              artwork_status:
                type: string
              sample_requested:
                type: boolean
              sample_tier:
                type: string
            required: [product_id, product_name, quantity]
        delivery_country:
          type: string
        delivery_pincode:
          type: string
        preferred_timeline:
          type: string
          enum: [urgent, standard, flexible]
        notes:
          type: string
        total_estimated_min:
          type: number
        total_estimated_max:
          type: number
      required: [contact_name, company_name, email, phone, items, delivery_country, preferred_timeline]

    QuoteRequest:
      type: object
      properties:
        id:
          type: string
        quote_id:
          type: string
        contact_name:
          type: string
        company_name:
          type: string
        email:
          type: string
        phone:
          type: string
        items:
          type: array
          items:
            type: object
        delivery_country:
          type: string
        delivery_pincode:
          type: string
          nullable: true
        preferred_timeline:
          type: string
        notes:
          type: string
          nullable: true
        total_estimated_min:
          type: number
          nullable: true
        total_estimated_max:
          type: number
          nullable: true
        status:
          type: string
          enum: [submitted, reviewing, quoted, accepted, rejected]
        rejection_reason:
          type: string
          nullable: true
        created_at:
          type: string
      required: [id, quote_id, contact_name, company_name, email, phone, items, delivery_country, preferred_timeline, status]

    Order:
      type: object
      properties:
        id:
          type: string
        order_id:
          type: string
        items:
          type: array
          items:
            type: object
        total_price:
          type: number
        payment_type:
          type: string
        discount_applied:
          type: number
        delivery_address:
          type: object
        status:
          type: string
          enum: [confirmed, in_production, qc, dispatched, delivered]
        estimated_delivery:
          type: string
          nullable: true
        tracking_number:
          type: string
          nullable: true
        tracking_url:
          type: string
          nullable: true
        created_at:
          type: string
      required: [id, order_id, items, total_price, payment_type, discount_applied, delivery_address, status, created_at]

    DesignRequest:
      type: object
      properties:
        id:
          type: string
        design_id:
          type: string
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        product_type:
          type: string
        brand_colors:
          type: string
          nullable: true
        brand_description:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        is_rush:
          type: boolean
        amount_paid:
          type: integer
        status:
          type: string
          enum: [paid, in_design, revision, approved]
        designer_notes:
          type: string
          nullable: true
        output_files:
          type: array
          items:
            type: string
          nullable: true
        created_at:
          type: string
      required: [id, design_id, contact_name, email, phone, product_type, is_rush, amount_paid, status, created_at]

    CreateDesignRequest:
      type: object
      properties:
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        product_type:
          type: string
        product_id:
          type: string
        brand_colors:
          type: string
        logo_url:
          type: string
        brand_description:
          type: string
        notes:
          type: string
        is_rush:
          type: boolean
        amount_paid:
          type: integer
        razorpay_payment_id:
          type: string
      required: [contact_name, email, phone, product_type, amount_paid]

    SampleRequest:
      type: object
      properties:
        id:
          type: string
        sample_id:
          type: string
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        product_id:
          type: string
        sample_tier:
          type: string
          enum: [standard, premium, complex]
        amount_paid:
          type: integer
        status:
          type: string
          enum: [paid, dispatched, delivered]
        created_at:
          type: string
      required: [id, sample_id, contact_name, email, phone, product_id, sample_tier, amount_paid, status, created_at]

    CreateSampleRequest:
      type: object
      properties:
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        product_id:
          type: string
        sample_tier:
          type: string
          enum: [standard, premium, complex]
        amount_paid:
          type: integer
        razorpay_payment_id:
          type: string
      required: [contact_name, email, phone, product_id, sample_tier, amount_paid]

    Invoice:
      type: object
      properties:
        id:
          type: string
        invoice_id:
          type: string
        order_id:
          type: string
        amount:
          type: number
        discount_line:
          type: number
        status:
          type: string
          enum: [pending, paid, overdue]
        due_date:
          type: string
        payment_method:
          type: string
          nullable: true
        pdf_url:
          type: string
          nullable: true
        created_at:
          type: string
      required: [id, invoice_id, order_id, amount, discount_line, status, due_date, created_at]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        company_name:
          type: string
          nullable: true
        contact_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        gstin:
          type: string
          nullable: true
        country:
          type: string
        orders_completed:
          type: integer
        credit_eligible:
          type: boolean
        credit_limit:
          type: number
        default_address:
          type: object
          nullable: true
      required: [id, email, country, orders_completed, credit_eligible, credit_limit]

    UpdateProfileRequest:
      type: object
      properties:
        company_name:
          type: string
        contact_name:
          type: string
        phone:
          type: string
        gstin:
          type: string
        default_address:
          type: object

    DashboardOverview:
      type: object
      properties:
        active_orders:
          type: integer
        last_order_date:
          type: string
          nullable: true
        total_saved:
          type: number
        orders_completed:
          type: integer
        credit_eligible:
          type: boolean
        credit_limit:
          type: number
        recent_orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [active_orders, total_saved, orders_completed, credit_eligible, credit_limit, recent_orders]

    Testimonial:
      type: object
      properties:
        id:
          type: string
        company_name:
          type: string
        city:
          type: string
        industry:
          type: string
        quote_text:
          type: string
        metric_label:
          type: string
        metric_value:
          type: string
        is_active:
          type: boolean
      required: [id, company_name, city, industry, quote_text, metric_label, metric_value, is_active]
